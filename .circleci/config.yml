version: 2.1

executors:
  python-executor:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project

jobs:
  build-site:
    executor: python-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-pixi-{{ checksum "pixi.lock" }}
            - v1-pixi-
      - run:
          name: Install pixi
          command: |
            curl -fsSL https://pixi.sh/install.sh | sh
            export PATH="$HOME/.pixi/bin:$PATH"
            pixi install --locked
      - save_cache:
          paths:
            - .pixi
          key: v1-pixi-{{ checksum "pixi.lock" }}
      - run:
          name: Build static site
          command: |
            export PATH="$HOME/.pixi/bin:$PATH"
            pixi run build
      - store_artifacts:
          path: _build
          destination: build-artifacts

      # Optionally persist for deployment jobs
      - persist_to_workspace:
          root: ~/project
          paths:
            - _build

  # Job for basic build (for regular commits to msin)
  build-basic:
    executor: python-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-pixi-{{ checksum "pixi.lock" }}
            - v1-pixi-
      - run:
          name: Install pixi
          command: |
            curl -fsSL https://pixi.sh/install.sh | sh
            export PATH="$HOME/.pixi/bin:$PATH"
            pixi install --locked
      - save_cache:
          paths:
            - .pixi
          key: v1-pixi-{{ checksum "pixi.lock" }}
      - run:
          name: Build static site
          command: |
            export PATH="$HOME/.pixi/bin:$PATH"
            pixi run build

workflows:
  version: 2

  # Workflow for pull requests - builds with artifacts
  pr-build:
    jobs:
      - build-site:
          filters:
            branches:
              ignore: main

  # Workflow for main branch - basic build only
  main-build:
    jobs:
      - build-basic:
          filters:
            branches:
              only: main
